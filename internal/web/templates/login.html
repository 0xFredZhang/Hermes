{{define "content"}}
<section class="page-panel">
  <div class="page-header">
    <div>
      <h2 class="page-title">登录</h2>
      <p class="page-description">输入本地控制台口令后继续管理云资源。</p>
    </div>
  </div>
  {{if .Error}}<p class="notice err">{{.Error}}</p>{{end}}
  <form class="form-row" method="post" action="/login">
    <label class="field">口令
      <input type="password" name="password" placeholder="口令" autofocus>
    </label>
    <button class="button-primary" type="submit">登录</button>
  </form>
</section>
{{end}}
