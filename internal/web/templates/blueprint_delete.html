{{define "content"}}
<section class="card page-panel workflow-card danger-zone" aria-labelledby="blueprint-delete-title">
  <div class="card-header workflow-card-header">
    <div class="min-w-0">
      <a class="back-link" href="/blueprints"><i class="ti ti-arrow-left icon" aria-hidden="true"></i><span>返回蓝图</span></a>
      <h2 class="card-title page-title" id="blueprint-delete-title">删除蓝图</h2>
      <p class="card-subtitle page-description">请在继续前确认目标与影响。</p>
    </div>
  </div>
  <div class="card-body">
    <div class="alert alert-danger danger-alert" role="alert">
      <p class="long-value">即将永久删除蓝图“{{.Blueprint.Name}}”。已有环境引用时，Hermes 会拒绝删除。</p>
    </div>
    <dl class="datagrid description-grid danger-target-summary" aria-label="待删除蓝图摘要">
      <div class="datagrid-item"><dt class="datagrid-title">名称</dt><dd class="datagrid-content long-value">{{.Blueprint.Name}}</dd></div>
      <div class="datagrid-item"><dt class="datagrid-title">Region</dt><dd class="datagrid-content long-value">{{.Blueprint.Params.Region}}</dd></div>
      <div class="datagrid-item"><dt class="datagrid-title">EC2</dt><dd class="datagrid-content long-value">{{.Blueprint.Params.EC2.InstanceType}} × {{.Blueprint.Params.EC2.Count}}</dd></div>
    </dl>
  </div>
  <div class="card-footer workflow-card-footer">
    <form class="workflow-actions" method="post" action="/blueprints/{{.Blueprint.ID}}/delete">
      <button class="btn btn-danger" type="submit" data-loading-label="删除中…"><i class="ti ti-trash icon" aria-hidden="true"></i><span>确认删除</span></button>
      <a class="btn btn-outline-secondary" href="/blueprints">取消</a>
    </form>
  </div>
</section>
{{end}}
