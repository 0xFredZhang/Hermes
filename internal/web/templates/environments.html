{{define "content"}}
<section class="card page-panel resource-list-card" aria-labelledby="environments-title">
  <div class="card-header">
    <div>
      <h2 class="card-title page-title" id="environments-title">环境</h2>
      <p class="card-subtitle page-description">查看每个 Pulumi stack 的状态、输出、日志和销毁流程。</p>
    </div>
  </div>
  <div class="table-responsive responsive-table-wrap">
    <table class="table table-vcenter card-table responsive-table">
      <caption class="sr-only">Pulumi 环境列表</caption>
      <thead><tr><th scope="col">ID</th><th scope="col">名称</th><th scope="col">Stack</th><th scope="col">Region</th><th scope="col">状态</th><th scope="col">操作</th></tr></thead>
      <tbody>
      {{range .Environments}}
        <tr><td data-label="ID">{{.ID}}</td><td data-label="名称" class="long-value">{{.Name}}</td><td data-label="Stack" class="long-value">{{.PulumiStack}}</td><td data-label="Region" class="long-value">{{.Region}}</td><td data-label="状态">{{template "environment_status_badge" .Status}}</td>
            <td data-label="操作"><div class="btn-list"><a class="btn btn-outline-primary" href="/environments/{{.ID}}"><i class="ti ti-eye icon" aria-hidden="true"></i><span>查看详情</span></a></div></td></tr>
      {{else}}
        <tr><td colspan="6" class="empty-row">
          <div class="empty">
            <div class="empty-icon"><i class="ti ti-cloud-off" aria-hidden="true"></i></div>
            <p class="empty-title">暂无环境</p>
            <p class="empty-subtitle text-secondary">先准备账号、项目与蓝图，再从蓝图页启动部署。</p>
            <div class="empty-action"><a class="btn btn-primary" href="/blueprints"><i class="ti ti-rocket icon" aria-hidden="true"></i><span>从蓝图部署</span></a></div>
          </div>
        </td></tr>
      {{end}}
      </tbody>
    </table>
  </div>
</section>
{{end}}
