{{define "content"}}
<section class="page-panel">
  <a class="back-link" href="/environments">← 返回环境列表</a>
  <div class="page-header">
    <div>
      <h2 class="page-title">环境:{{.Env.Name}} <span class="stack-label">({{.Env.PulumiStack}})</span></h2>
      <p class="page-description">查看当前状态、资源输出和实时 Job 日志。销毁前会先生成 destroy preview。</p>
    </div>
  </div>
  {{template "env_status" .}}
  <h3 class="section-title">实时日志</h3>
  <pre id="log" class="log-panel">{{.CurrentLogs}}</pre>
</section>
{{if .CurrentJobID}}
<script>
(function(){
  var es = new EventSource("/jobs/{{.CurrentJobID}}/logs/stream");
  var log = document.getElementById("log");
  es.onmessage = function(e){ log.textContent += e.data + "\n"; log.scrollTop = log.scrollHeight; };
  es.addEventListener("done", function(){
    es.close();
    if (window.htmx) htmx.ajax("GET", "/environments/{{.Env.ID}}/status", "#status");
  });
})();
</script>
{{end}}
{{end}}
