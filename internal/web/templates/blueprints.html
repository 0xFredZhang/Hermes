{{define "content"}}
<h2>蓝图</h2>
{{if .Error}}<p class="err">{{.Error}}</p>{{end}}
<form method="post" action="/blueprints">
  <fieldset>
    <legend>新建蓝图(安全组 + EC2)</legend>
    <label>名称 <input name="name" required></label>
    <label>项目 <select name="project_id" required>{{range .Projects}}<option value="{{.ID}}">{{.Name}}</option>{{end}}</select></label>
    <label>云账号
      <select name="cloud_account_id" required
              hx-get="/blueprints/regions" hx-trigger="change, load"
              hx-target="#region-select" hx-swap="innerHTML">
        {{range .Accounts}}<option value="{{.ID}}">{{.Name}} ({{.AWSAccountID}})</option>{{end}}
      </select>
    </label>
    <label>Region
      <input type="search" class="select-search" data-filter-select="#region-select"
             placeholder="搜索地区或代码" oninput="filterSelectOptions(this)">
      <select name="region" id="region-select" required
              hx-get="/blueprints/instance-types" hx-trigger="change"
              hx-target="#instance-type-select" hx-swap="innerHTML"
              hx-include="[name='cloud_account_id'],[name='region']"
              hx-on::after-swap="this.dispatchEvent(new Event('change', {bubbles:true}))">
        <option value="ap-southeast-1">亚太地区（新加坡） · ap-southeast-1</option>
      </select>
    </label>
    <label>实例规格
      <input type="search" class="select-search" data-filter-select="#instance-type-select"
             placeholder="搜索规格 / CPU / 内存" oninput="filterSelectOptions(this)">
      <select name="instance_type" id="instance-type-select" required
              hx-get="/blueprints/amis" hx-trigger="change"
              hx-target="#ami-select" hx-swap="innerHTML"
              hx-include="[name='cloud_account_id'],[name='region'],[name='instance_type']"
              hx-on::after-swap="this.dispatchEvent(new Event('change', {bubbles:true}))">
        <option value="t3.micro">t3.micro · 2C1G</option>
      </select>
    </label>
    <label>数量 <input name="count" type="number" value="1" min="1" max="10" required></label>
    <label>AMI
      <select name="ami" id="ami-select">
        <option value="">自动:最新 Ubuntu 26.04 LTS</option>
      </select>
    </label>
    <label>系统盘 GB <input name="root_volume_gb" type="number" value="8" min="8" required></label>
    <label>Key Pair(可选) <input name="key_name" placeholder="可选"></label>
    <label>入站端口 <input name="ingress_port" type="number" value="22" required></label>
    <label>协议 <select name="ingress_protocol"><option value="tcp">tcp</option><option value="udp">udp</option></select></label>
    <label>来源 CIDR <input name="ingress_cidr" value="0.0.0.0/0" required></label>
  </fieldset>
  <button type="submit">保存蓝图</button>
</form>
<table>
  <thead><tr><th>名称</th><th>Region</th><th>规格×数量</th><th></th></tr></thead>
  <tbody id="blueprint-rows">{{template "blueprint_rows" .Blueprints}}</tbody>
</table>
<script>
function filterSelectOptions(input) {
  var select = document.querySelector(input.dataset.filterSelect);
  if (!select) return;
  var query = input.value.trim().toLowerCase();
  var firstVisible = null;
  var selectedVisible = false;
  Array.prototype.forEach.call(select.options, function(option) {
    var text = (option.textContent + " " + option.value).toLowerCase();
    var visible = !query || text.indexOf(query) !== -1;
    option.hidden = !visible;
    if (visible && option.value && !firstVisible) firstVisible = option;
    if (option.selected && visible) selectedVisible = true;
  });
  if (query && !selectedVisible && firstVisible) {
    select.value = firstVisible.value;
    select.dispatchEvent(new Event("change", {bubbles: true}));
  }
}

document.addEventListener("htmx:afterSwap", function(event) {
  if (!event.target || event.target.tagName !== "SELECT" || !event.target.id) return;
  var input = document.querySelector('[data-filter-select="#' + event.target.id + '"]');
  if (input) filterSelectOptions(input);
});
</script>
{{end}}
