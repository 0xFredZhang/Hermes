{{define "content"}}
<section class="page-panel">
  <div class="page-header"><div><h2 class="page-title">蓝图</h2><p class="page-description">可复用的环境规格。编辑不会改变已有环境快照。</p></div><a class="button-primary" href="/blueprints/new">新建蓝图</a></div>
  {{if .Error}}<p class="notice err" role="alert">{{.Error}}</p>{{end}}
  <div class="notice err" id="blueprint-feedback" role="alert" aria-live="assertive" hidden></div>
  <div class="table-wrap"><table class="data-table"><thead><tr><th>名称</th><th>Region</th><th>规格×数量</th><th>操作</th></tr></thead><tbody id="blueprint-rows">{{template "blueprint_rows" .Blueprints}}</tbody></table></div>
</section>
{{end}}
