{{define "content"}}
<section class="card page-panel resource-list-card" aria-labelledby="blueprints-title">
  <div class="card-header">
    <div>
      <h2 class="card-title page-title" id="blueprints-title">蓝图</h2>
      <p class="card-subtitle page-description">可复用的环境规格。编辑不会改变已有环境快照。</p>
    </div>
    <div class="card-actions">
      <a class="btn btn-primary" href="/blueprints/new"><i class="ti ti-plus icon" aria-hidden="true"></i><span>新建蓝图</span></a>
    </div>
  </div>
  {{if .Error}}<p class="notice err" role="alert">{{.Error}}</p>{{end}}
  <div class="notice err" id="blueprint-feedback" role="alert" aria-live="assertive" hidden></div>
  <div id="blueprint-delete-status" class="notice ok" role="status" aria-live="polite" tabindex="-1" hidden></div>
  <div class="table-responsive responsive-table-wrap">
    <table class="table table-vcenter card-table responsive-table">
      <caption class="sr-only">可部署蓝图列表</caption>
      <thead><tr><th scope="col">名称</th><th scope="col">Region</th><th scope="col">规格×数量</th><th scope="col">操作</th></tr></thead>
      <tbody id="blueprint-rows">{{template "blueprint_rows" .Blueprints}}</tbody>
    </table>
  </div>
</section>
{{end}}
