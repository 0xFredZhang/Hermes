{{define "layout"}}<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body class="app-shell">
  <div class="app-frame">
    <header class="app-header">
      <div class="brand-block">
        <h1 class="brand-title">Hermes</h1>
        <p class="brand-subtitle">自托管 AWS 资源编排控制台</p>
      </div>
      <nav class="top-nav" aria-label="主导航">
        <a class="nav-link" href="/accounts">账号</a>
        <a class="nav-link" href="/projects">项目</a>
        <a class="nav-link" href="/blueprints">蓝图</a>
        <a class="nav-link" href="/environments">环境</a>
        <form class="logout-form" method="post" action="/logout"><button class="button-muted">退出</button></form>
      </nav>
    </header>
    <main class="app-main">
      {{template "content" .}}
    </main>
  </div>
</body>
</html>{{end}}
