{{define "layout"}}<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{if .PageTitle}}{{.PageTitle}} · {{end}}Hermes</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/blueprint_metadata.js" defer></script>
  <script src="/static/ui_feedback.js" defer></script>
  <script src="/static/tabler.min.js" defer></script>
  <script src="/static/app.js" defer></script>
</head>
<body class="{{if .HideNav}}page page-center auth-shell{{else}}page app-shell{{end}}">
  <a class="skip-link" href="#main-content">跳到主要内容</a>
  {{if .HideNav}}
  <main class="container container-tight py-4 auth-main" id="main-content" tabindex="-1">
    <a class="auth-brand" href="/login" aria-label="Hermes 登录">
      <i class="ti ti-cloud-lock" aria-hidden="true"></i>
      <h1 class="hermes-brand-title">Hermes</h1>
    </a>
    {{template "content" .}}
  </main>
  {{else}}
  <aside class="navbar navbar-vertical navbar-expand-lg hermes-sidebar">
    <div class="container-fluid">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#hermes-sidebar-menu" aria-controls="hermes-sidebar-menu" aria-expanded="false" aria-label="切换主导航">
        <span class="navbar-toggler-icon"></span>
      </button>
      <a class="navbar-brand navbar-brand-autodark" href="/accounts" aria-label="Hermes 账号首页">
        <i class="ti ti-cloud-lock hermes-brand-icon" aria-hidden="true"></i>
        <h1 class="hermes-brand-title">Hermes</h1>
      </a>
      <nav class="collapse navbar-collapse" id="hermes-sidebar-menu" aria-label="主导航">
        <ul class="navbar-nav pt-lg-3">
          <li class="nav-item">
            <a class="nav-link{{if eq .ActiveNav "accounts"}} active{{end}}" href="/accounts"{{if eq .ActiveNav "accounts"}} aria-current="page"{{end}}>
              <span class="nav-link-icon" aria-hidden="true"><i class="ti ti-cloud-cog" aria-hidden="true"></i></span>
              <span class="nav-link-title">账号</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link{{if eq .ActiveNav "projects"}} active{{end}}" href="/projects"{{if eq .ActiveNav "projects"}} aria-current="page"{{end}}>
              <span class="nav-link-icon" aria-hidden="true"><i class="ti ti-folders" aria-hidden="true"></i></span>
              <span class="nav-link-title">项目</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link{{if eq .ActiveNav "blueprints"}} active{{end}}" href="/blueprints"{{if eq .ActiveNav "blueprints"}} aria-current="page"{{end}}>
              <span class="nav-link-icon" aria-hidden="true"><i class="ti ti-template" aria-hidden="true"></i></span>
              <span class="nav-link-title">蓝图</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link{{if eq .ActiveNav "environments"}} active{{end}}" href="/environments"{{if eq .ActiveNav "environments"}} aria-current="page"{{end}}>
              <span class="nav-link-icon" aria-hidden="true"><i class="ti ti-server-cog" aria-hidden="true"></i></span>
              <span class="nav-link-title">环境</span>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </aside>
  <div class="page-wrapper">
    <header class="navbar navbar-expand-md d-print-none hermes-topbar">
      <div class="container-fluid">
        <div class="navbar-nav flex-row ms-auto">
          <form class="logout-form" method="post" action="/logout">
            <button class="btn btn-outline-secondary hermes-logout" type="submit" data-loading-label="退出中…">
              <i class="ti ti-logout" aria-hidden="true"></i>
              <span>退出</span>
            </button>
          </form>
        </div>
      </div>
    </header>
    <div class="page-body">
      <main class="container-xl app-main" id="main-content" tabindex="-1">
        {{template "content" .}}
      </main>
    </div>
  </div>
  <dialog id="confirm-dialog" aria-labelledby="confirm-title" aria-describedby="confirm-message">
    <form class="confirm-dialog" method="dialog">
      <h2 class="section-title" id="confirm-title">确认操作</h2>
      <p id="confirm-message" class="long-value">此操作需要确认。</p>
      <div class="dialog-actions">
        <button id="confirm-cancel" type="button" value="cancel">取消</button>
        <button class="button-danger" id="confirm-submit" type="button" value="confirm">确认</button>
      </div>
    </form>
  </dialog>
  {{end}}
</body>
</html>{{end}}
