{{define "content"}}
<section class="page-panel" aria-labelledby="accounts-title">
  <div class="page-header">
    <div>
      <h2 class="page-title" id="accounts-title">AWS 云账号</h2>
      <p class="page-description">管理用于蓝图和环境部署的 AWS 账号。</p>
    </div>
    <a class="button button-primary" href="/accounts/new">添加账号</a>
  </div>
  <div class="table-wrap responsive-table-wrap">
    <table class="data-table responsive-table">
      <caption class="sr-only">AWS 云账号列表</caption>
      <thead><tr><th scope="col">别名</th><th scope="col">默认区域</th><th scope="col">Account ID</th><th scope="col">ARN</th><th scope="col">操作</th></tr></thead>
      <tbody id="rows">{{template "rows" .Accounts}}</tbody>
    </table>
  </div>
</section>
{{end}}
