{{define "rows"}}
{{range .}}
<tr>
  <td>{{.Name}}</td><td>{{.AWSAccountID}}</td><td>{{.ARN}}</td>
  <td><button class="button-danger" hx-delete="/accounts/{{.ID}}" hx-target="#rows" hx-swap="innerHTML"
              hx-confirm="删除该账号?">删除</button></td>
</tr>
{{else}}
<tr><td colspan="4" class="empty-row">暂无账号，添加一个后即可创建蓝图。</td></tr>
{{end}}
{{end}}
