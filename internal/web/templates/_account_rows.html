{{define "rows"}}
{{range .}}
<tr>
  <td data-label="别名">{{.Name}}</td>
  <td data-label="默认区域">{{.DefaultRegion}}</td>
  <td data-label="Account ID">{{.AWSAccountID}}</td>
  <td data-label="ARN" class="long-value">{{.ARN}}</td>
  <td data-label="操作"><button class="button-danger" type="button" hx-delete="/accounts/{{.ID}}" hx-target="#rows" hx-swap="innerHTML"
              hx-confirm="删除账号“{{.Name}}”？">删除</button></td>
</tr>
{{else}}
<tr><td colspan="5" class="empty-row">暂无账号。<a href="/accounts/new">添加 AWS 账号</a>后即可创建蓝图。</td></tr>
{{end}}
{{end}}
